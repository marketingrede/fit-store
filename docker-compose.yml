services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
      - "3036:3036"
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - node_modules:/rails/node_modules
      - storage:/rails/storage
    environment:
      RAILS_ENV: development
      BINDING: 0.0.0.0
      ADMIN_PASSWORD: altere-esta-senha
    stdin_open: true
    tty: true

volumes:
  bundle:
  node_modules:
  storage:
