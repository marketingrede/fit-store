<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Fit Store - A Loja do Movimenta Muito +</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <a href="index.html">
        <img src="Imagens Site/LOGO Movimenta + (V).jpg" alt="Movimenta+" class="logo-img" />
      </a>
    </div>
    <div class="fitcoin-badge">
      Preços em <strong>Fitcoin (FITC)</strong>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-text">
        <h1><span class="brand-name">Fit Store</span></h1>
        <p>A loja oficial do <strong>Movimenta +</strong>.</p>
        <p>
          Suplementos, meias, camisas e muito mais...<br />
          Use seu saldo de <strong>Fitcoin</strong> para turbinar seus treinos.
        </p>
      </div>
    </section>

    <section class="filters">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar produto por nome..."
        />
      </div>

      <div class="category-filter">
        <button class="filter-btn active" data-category="all">Todos</button>
        <button class="filter-btn" data-category="proteinas">Proteínas</button>
        <button class="filter-btn" data-category="alimentos-proteicos">Alimentos</button>
        <button class="filter-btn" data-category="creatina-energia">Energia</button>
        <button class="filter-btn" data-category="vitaminas-minerais">Vitaminas</button>
        <button class="filter-btn" data-category="vestuario">Vestuário</button>
        <button class="filter-btn" data-category="acessorios-musculacao">Acessórios</button>
        <button class="filter-btn" data-category="equipamentos">Equipamentos</button>
        <button class="filter-btn" data-category="protecao-solar">Proteção Solar</button>
        <button class="filter-btn" data-category="eletronicos">Eletrônicos</button>
        <button class="filter-btn" data-category="medicao">Medição</button>
      </div>
    </section>

    <section class="products-grid" id="productsGrid">
      <!-- Os produtos serão inseridos pelo script.js -->
    </section>
  </main>

  <footer class="footer">
    <p>Fit Store • A Loja do Movimenta + • Preços fictícios em Fitcoin (FITC)</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
