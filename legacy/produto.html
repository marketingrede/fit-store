  <link rel="stylesheet" href="styles.css" />
  <style>
    .product-detail-wrapper {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 7vw 40px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #6b7280;
      text-decoration: none;
      margin-bottom: 16px;
    }

    .back-link:hover {
      color: #0f172a;
    }

    .product-detail-card {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.8fr);
      gap: 24px;
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      padding: 18px;
    }

    .product-detail-image {
      border-radius: 16px;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: radial-gradient(circle at 20% 0, rgba(0, 191, 179, 0.18), rgba(209, 213, 219, 0.4));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-detail-title {
      font-size: 1.4rem;
      margin-bottom: 6px;
      color: #0f172a;
    }

    .product-detail-category {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 14px;
    }

    .product-detail-description {
      font-size: 0.95rem;
      color: #111827;
      margin-bottom: 16px;
    }

    .product-detail-price {
      font-size: 1.2rem;
      font-weight: 700;
      color: #00bfb3;
      margin-bottom: 8px;
    }

    .product-detail-meta {
      font-size: 0.83rem;
      color: #6b7280;
    }

    @media (max-width: 768px) {
      .product-detail-card {
        grid-template-columns: 1fr;
      }

      .product-detail-wrapper {
        margin-top: 24px;
        padding-inline: 16px;
      }
    }

  </style>

    function formatCategory(cat) {
      const map = {
        "alimentos-proteicos": "Alimentos Proteicos",
        "equipamentos": "Equipamentos",
        "protecao-solar": "Proteção Solar",
        "vitaminas-minerais": "Vitaminas & Minerais",
        "acessorios-musculacao": "Acessórios Musculação",
        "medicao": "Medição",
        "vestuario": "Vestuário",
        "creatina-energia": "Creatina & Energia",
        "proteinas": "Proteínas",
        "eletronicos": "Eletrônicos"
      };
      return map[cat] || cat;
    }

    let currentProduct = null;

    function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const id = Number(params.get("id"));

      // Sem ID na URL → redireciona para o catálogo
      if (!params.get("id")) {
        window.location.replace("index.html");
        return;
      }

      const product = products.find((p) => p.id === id);
      const container = document.getElementById("productDetail");

      if (!product) {
        container.innerHTML = `
          <p style="color:#f97373;margin-bottom:12px;">Produto não encontrado.</p>
          <a href="index.html" style="color:#00bfb3;font-size:0.9rem;">← Voltar para o catálogo</a>
        `;
        return;
      }

      currentProduct = product;
      document.title = product.name + " | Fit Store";

      container.innerHTML = `
        <article class="product-detail-card">
          <div class="product-detail-image" style="overflow:hidden;">
            <img src="${product.image}" alt="${product.name}" style="width:100%;height:100%;object-fit:cover;border-radius:16px;" onerror="this.style.display='none'">
          </div>
          <div>
            <h1 class="product-detail-title">${product.name}</h1>
            <p class="product-detail-category">
              Categoria: ${formatCategory(product.category)} • Tag: ${product.tag}
            </p>
            <p class="product-detail-description">${product.description}</p>
            <p class="product-detail-price">${product.priceFitcoin} FITC</p>
            <p class="product-detail-meta">
              Use seu saldo de Fitcoin para resgatar este produto.
              Entre em contato com o RH para confirmar disponibilidade.
            </p>
          </div>
        </article>
      `;
    }

    loadProduct();
